
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단답형 문제풀이</title>
    <style>
        /* 기존 디자인 유지 및 보강 */
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }

	/* 상단 헤더 및 입력창 스타일 */
.header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #3498db;
    margin-bottom: 15px;
    padding-bottom: 10px;
    flex-wrap: wrap;
    gap: 10px;
}

.jump-container { display: flex; align-items: center; gap: 5px; }
.jump-input {
    width: 50px;
    padding: 6px;
    border: 1px solid #bdc3c7;
    border-radius: 4px;
    text-align: center;
    font-size: 0.9rem;
}
.btn-jump {
    padding: 6px 10px;
    font-size: 0.8rem;
    background: #34495e;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}
        .btn-mode { padding: 5px 10px; font-size: 0.8rem; background: #ecf0f1; color: #7f8c8d; border: 1px solid #bdc3c7; border-radius: 4px; cursor: pointer; }
        .btn-mode.active { background: #2ecc71; color: white; border-color: #27ae60; }

	.question { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; line-height: 1.7; color: #34495e; word-break: keep-all; }

        .question img, .answer-box img { max-width: 100%; height: auto; display: block; margin: 10px 0; border-radius: 6px; }
        .question audio, .answer-box audio { width: 100%; margin: 10px 0; }

        .answer-box { display: none; background: #e8f4fd; border-left: 5px solid #3498db; padding: 15px; margin-top: 20px; border-radius: 4px; font-size: 1rem; line-height: 1.6; word-break: keep-all; }

        /* 버튼 그룹 */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: 0.3s; font-weight: bold; }
        .btn-prev { background-color: #95a5a6; color: white; }
        .btn-check { background-color: #34495e; color: white; }
        .btn-next { background-color: #3498db; color: white; }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #dcdde1; cursor: not-allowed; }

        .info { font-size: 0.85rem; color: #95a5a6; margin-top: 20px; text-align: center; }
        a { color: #3498db; text-decoration: underline; }

	/* 아주 작은 푸터 스타일 */
.mini-footer {
    margin-top: 30px;
    padding-top: 15px;
    border-top: 1px solid #e0e0e0;
    text-align: center;
}

.footer-links {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.footer-links a {
    font-size: 0.75rem; /* 아주 작은 글씨 */
    color: #95a5a6; /* 연한 회색 */
    text-decoration: none;
    transition: color 0.2s;
}

.footer-links a:hover {
    color: #3498db; /* 마우스 올리면 파란색 */
    text-decoration: underline;
}

/* 구분선(|) 스타일 */
.footer-links span {
    font-size: 0.7rem;
    color: #ecf0f1;
}
    </style>
</head>

<div class="quiz-container">

<script>
    // [문제 및 선택지, 정답] 형식
    // 여기에 모든 데이터를 넣으시면 됩니다.
     const quizData = [
  ["<span style='color: #003399;'>1. 전하의 성질 중 같은 종류의 전하끼리, 그리고 다른 종류의 전하끼리 작용하는 힘은?</span>", "반발력, 흡인력 (해설: 자석처럼 같은 극은 밀어내고(반발), 다른 극은 당깁니다(흡인).전기기능사의 가장 기초 개념입니다.)"],
  ["<span style='color: #003399;'>2. 전류(I)를 구하는 기본 공식은 무엇인가? (전하량 Q, 시간 t)</span>", "I = Q / t (해설: 전류는 단위 시간당 흐르는 전하의 양입니다. 1초에 1쿨롱이 흐르면 1암페어(A)가 됩니다.)"],
  ["<span style='color: #003399;'>3. 1[kWh]를 열량[kcal]으로 환산하면 얼마인가?</span>", "860[kcal] (해설: 1[J] = 0.24[cal] 공식을 1시간 단위로 환산한 결과값입니다. 계산기 없이도 바로 튀어나와야 하는 단골 숫자입니다.)"],
  ["<span style='color: #003399;'>4. 온도가 상승할 때 저항값이 오히려 감소하는 성질을 가진 물질은?</span>", "반도체, 탄소, 전해액 (해설: 일반 금속은 뜨거워지면 저항이 커지지만, 얘네는 반대로 움직이는 '부온도 계수' 특성을 가집니다.)"],
  ["<span style='color: #003399;'>5. 전선의 길이를 2배로 늘리면 저항은 몇 배가 되는가?</span>", "2배 (해설: 저항은 전선의 길이에 비례합니다. 길이(장애물 구간)가 길어질수록 통과하기 힘들어지기 때문입니다.)"],
  ["<span style='color: #003399;'>6. 전선의 단면적을 2배로 넓히면 저항은 어떻게 변하는가?</span>", "1/2배로 감소 (해설: 저항은 단면적에 반비례합니다. 통로가 넓어지면 전기가 더 잘 흐르므로 저항은 줄어듭니다.)"],
  ["<span style='color: #003399;'>7. '유입되는 전류의 합은 유출되는 전류의 합과 같다'는 법칙은?</span>", "키르히호프의 제1법칙(전류 법칙) (해설: 어느 한 점으로 들어온 전기는 어디론가 반드시 나가야 한다는 보존의 법칙입니다.)"],
  ["<span style='color: #003399;'>8. 두 전하 사이에 작용하는 힘의 크기를 정하는 법칙은?</span>", "쿨롱의 법칙 (해설: 전하가 클수록 힘은 세지고, 전하 사이의 거리 제곱에 반비례하여 힘이 약해진다는 법칙입니다.)"],
  ["<span style='color: #003399;'>9. 자기력선의 성질 중 옳은 것은? (교차 여부)</span>", "서로 교차하지 않는다 (해설: 자기력선은 N에서 S로 가며 절대 서로 겹치거나 끊어지지 않는 가상의 선입니다.)"],
  ["<span style='color: #003399;'>10. 콘덴서에 축적되는 에너지(W)를 구하는 공식은?</span>", "W = 1/2 * C * V^2 (해설: 정전용량(C)과 전압(V)의 제곱에 비례합니다. 에너지 공식 중 가장 출제 빈도가 높습니다.)"],
  ["<span style='color: #003399;'>11. 플레밍의 왼손 법칙은 무엇을 정의하는가?</span>", "전동기(모터)의 원리 (해설: '왼전'으로 외우세요. 자기장 속 전류가 받는 '힘의 방향'을 결정합니다.)"],
  ["<span style='color: #003399;'>12. 플레밍의 오른손 법칙은 무엇을 정의하는가?</span>", "발전기의 원리 (해설: '우발'로 외우세요. 자속을 끊을 때 생기는 '유도기전력(전기)의 방향'을 결정합니다.)"],
  ["<span style='color: #003399;'>13. 직류발전기의 3대 요소는?</span>", "계자, 전기자, 정류자 (해설: 자석(계자) + 회전하는 코일(전기자) + 교류를 직류로 바꾸는 부품(정류자)입니다.)"],
  ["<span style='color: #003399;'>14. 변압기의 원리가 되는 핵심 현상은?</span>", "전자유도 작용 (해설: 1차 코일의 자기장 변화가 2차 코일에 전기를 유도해내는 원리입니다.)"],
  ["<span style='color: #003399;'>15. 변압기 내부 결함 시 가스나 유류의 이동을 감지하는 계전기는?</span>", "브흐홀츠 계전기 (해설: 변압기 본체와 콘서베이터 사이 파이프에 설치하는 기계적 보호 장치입니다.)"],
  ["<span style='color: #003399;'>16. 동기속도(Ns) 공식은 어떻게 되는가?</span>", "Ns = 120f / P (해설: 주파수(f)에 비례하고 극수(P)에 반비례합니다. 계산 문제로 매우 자주 나옵니다.)"],
  ["<span style='color: #003399;'>17. 슬립(s)이 1인 상태는 어떤 상태인가?</span>", "정지 상태 (해설: 슬립은 '속도 차이 비율'입니다. 회전자가 멈춰있으면 슬립은 최대치인 1이 됩니다.)"],
  ["<span style='color: #003399;'>18. SCR(사이리스터)의 단자 3개 이름은?</span>", "애노드, 캐소드, 게이트 (해설: 게이트(Gate)라는 대문에 신호를 주어야만 전류가 흐르는 단방향 스위치 소자입니다.)"],
  ["<span style='color: #003399;'>19. 교류를 직류로 바꾸는 과정을 무엇이라 하는가?</span>", "정류 (해설: 다이오드 등을 이용하여 한쪽 방향으로만 전류를 흐르게 만드는 과정입니다.)"],
  ["<span style='color: #003399;'>20. 전선의 굵기를 결정하는 가장 중요한 3요소는?</span>", "허용전류, 전압강하, 기계적 강도 (해설: 전선이 버티는 전류량, 전압 손실, 튼튼함 이 세 가지가 설계의 핵심입니다.)"],
  ["<span style='color: #003399;'>21. 접지선의 색상은 원칙적으로 무엇인가?</span>", "녹색과 노란색의 혼합 (해설: KEC 규정에 따라 접지(보호도체)는 녹-노 혼합색을 사용합니다.)"],
  ["<span style='color: #003399;'>22. 금속관 끝에 끼워 전선의 피복 손상을 방지하는 부품은?</span>", "부심(Bushing) (해설: 관의 날카로운 단면에 전선이 긁혀 합선되는 것을 막아줍니다.)"],
  ["<span style='color: #003399;'>23. 가연성 가스가 있는 위험한 장소에 시공하는 공사법은?</span>", "금속관 공사 (해설: 가스가 폭발해도 불꽃이 밖으로 나가지 못하게 금속관으로 밀봉하는 '방폭' 개념입니다.)"],
  ["<span style='color: #003399;'>24. 지지물(전봇대)이 쓰러지지 않도록 보강하는 선은?</span>", "지선 (해설: 전봇대 옆에서 비스듬히 땅으로 연결된 철선입니다. 철탑에는 지선을 사용하지 않습니다.)"],
  ["<span style='color: #003399;'>25. 전선 접속 시 저항이 증가하면 안 되는 이유는?</span>", "열이 발생하여 화재 위험 (해설: 저항이 커지면 $I^2R$에 의해 열이 발생합니다. 접속은 단단하게 해서 저항을 최소화해야 합니다.)"],
  ["<span style='color: #003399;'>26. 누전 시 감전을 방지하기 위해 설치하는 차단기는?</span>", "누전차단기(ELB) (해설: 나가는 전류와 들어오는 전류의 차이가 생기면 전기를 즉시 끊어버립니다.)"],
  ["<span style='color: #003399;'>27. 화재 시 대피로를 안내하기 위해 켜지는 등은?</span>", "유도등 (해설: 비상구 위치를 알려주는 녹색 등입니다.)"],
  ["<span style='color: #003399;'>28. 전선관 내부에서 전선을 접속해도 되는가?</span>", "안 된다 (해설: 전선 접속은 반드시 박스(조인트 박스 등) 내부에서만 해야 하며 관 안에서는 금지됩니다.)"],
  ["<span style='color: #003399;'>29. 절연 저항을 측정하는 측정기 이름은?</span>", "메거(Megger) (해설: 전기가 새지 않는지(절연) 아주 높은 저항값을 측정하는 장치입니다.)"],
  ["<span style='color: #003399;'>30. 사람이 쉽게 접촉하는 장소의 누전차단기 동작 시간 기준은?</span>", "0.03초 이내 (해설: 사람이 감전되어 심장이 멎기 전에 아주 빠르게 차단해야 합니다.)"],
  ["<span style='color: #003399;'>31. 전압의 측정 단위인 [V](볼트)를 에너지[J]와 전하량[C]으로 표현하면?</span>", "V = J / C (해설: 전압은 '단위 전하가 이동하면서 하는 일(에너지)'의 양입니다. 1C이 이동해 1J의 일을 하면 1V입니다.)"],
  ["<span style='color: #003399;'>32. 저항을 병렬로 연결할수록 전체(합성) 저항값은 어떻게 되는가?</span>", "작아진다 (해설: 저항을 병렬로 연결하는 것은 고속도로의 차선을 늘리는 것과 같습니다. 길이 넓어지니 전체 저항은 줄어듭니다.)"],
  ["<span style='color: #003399;'>33. 전류에 의해 발생하는 열량(H)을 구하는 법칙은?</span>", "줄(Joule)의 법칙 (해설: 공식 $H = 0.24I^2Rt$입니다. 전선에 전류가 흐르면 저항 때문에 열이 발생한다는 법칙입니다.)"],
  ["<span style='color: #003399;'>34. 정전용량의 단위 [F]의 읽는 법은?</span>", "패럿(Farad) (해설: 콘덴서가 전기를 얼마나 저장할 수 있는지를 나타내는 단위입니다.)"],
  ["<span style='color: #003399;'>35. 물질에 따라 자석에 붙는 정도를 나타내는 비율은?</span>", "투자율 (해설: 자기력선이 얼마나 잘 통과하느냐를 나타내며, 철과 같은 강자성체는 투자율이 매우 높습니다.)"],
  ["<span style='color: #003399;'>36. 자석의 N극과 S극을 떼어낼 수 있는가?</span>", "없다 (해설: 자석은 아무리 작게 잘라도 항상 N극과 S극이 쌍으로 존재합니다. 이를 '자기 단극자는 없다'고 합니다.)"],
  ["<span style='color: #003399;'>37. 교류 전압의 크기를 말할 때 별도의 언급이 없으면 무엇을 의미하는가?</span>", "실효값 (해설: 우리가 쓰는 220V는 최대값이 아니라 실제로 일을 하는 평균적인 힘인 '실효값'을 말합니다.)"],
  ["<span style='color: #003399;'>38. 코일(인덕턴스)에서 전류의 흐름을 방해하는 성분은?</span>", "유도 리액턴스 (해설: 공식은 $X_L = 2πfL$입니다. 주파수가 높을수록 저항 성분이 커지는 특징이 있습니다.)"],
  ["<span style='color: #003399;'>39. 3상 교류에서 세 전압의 위상차는 몇 도인가?</span>", "120도 (해설: 360도를 셋이서 공평하게 나누어 120도씩 차이를 두고 회전합니다.)"],
  ["<span style='color: #003399;'>40. 역률을 개선하기 위해 부하와 병렬로 연결하는 것은?</span>", "전력용 콘덴서 (해설: 모터 등에서 발생하는 무효전력을 상쇄시켜 전기 효율(역률)을 높여줍니다.)"],
  ["<span style='color: #003399;'>41. 직류기에서 자속을 만드는 부분은?</span>", "계자(Field) (해설: 고정되어 있는 자석 부분으로, 코일이 회전할 수 있는 자기장을 형성합니다.)"],
  ["<span style='color: #003399;'>42. 직류 발전기에서 정류를 돕기 위해 주자극 사이에 설치하는 작은 극은?</span>", "보극 (해설: 정류 시 발생하는 불꽃을 억제하여 정류 작용을 원활하게 돕는 역할을 합니다.)"],
  ["<span style='color: #003399;'>43. 무부하 상태에서 회전수가 위험할 정도로 높아져 반드시 벨트가 아닌 기어로 연결해야 하는 모터는?</span>", "직권 전동기 (해설: 부하가 없으면 속도가 무한대로 올라가 폭발 위험이 있으므로 절대 벨트 구동을 하지 않습니다.)"],
  ["<span style='color: #003399;'>44. 변압기의 권수비(a)가 10이고 1차 전압이 220V라면 2차 전압은?</span>", "22V (해설: 권수비 $a = V_1 / V_2$입니다. 1차 전압을 권수비로 나누면 2차 전압이 나옵니다.)"],
  ["<span style='color: #003399;'>45. 변압기에서 철손을 줄이기 위해 철심을 어떻게 만드는가?</span>", "규소강판 성층 철심 (해설: 얇은 규소강판을 겹겹이 쌓아(성층) 맴돌이 전류에 의한 에너지 손실을 막습니다.)"],
  ["<span style='color: #003399;'>46. 변압기유(절연유)가 갖추어야 할 조건 중 냉각 효과는 어떠해야 하는가?</span>", "커야 한다 (해설: 뜨거워진 변압기 내부를 빨리 식힐 수 있도록 비열과 열전도도가 커야 합니다.)"],
  ["<span style='color: #003399;'>47. 동기 발전기를 병렬 운전할 때 같아야 하는 조건이 아닌 것은? (자주 나오는 오답)</span>", "용량, 전류 (해설: 전압, 주파수, 위상, 파형은 같아야 하지만 용량과 전류는 달라도 됩니다.)"],
  ["<span style='color: #003399;'>48. 유도전동기에서 회전자가 도는 방향을 바꾸려면?</span>", "3상 중 2상의 접속을 바꾼다 (해설: 임의의 두 선을 서로 바꿔 끼우면 회전 자기장의 방향이 반대가 되어 역회전합니다.)"],
  ["<span style='color: #003399;'>49. 주로 가정용 세탁기나 선풍기에 쓰이는 단상 유도전동기는?</span>", "커패시터(콘덴서) 기동형 (해설: 기동 토크가 커서 가전제품에 가장 많이 사용되는 방식입니다.)"],
  ["<span style='color: #003399;'>50. 반도체 소자 중 게이트(G) 신호로 'on'과 'off'가 모두 가능한 것은?</span>", "GTO (해설: 일반 SCR은 끄는 것이 어렵지만, GTO는 게이트 신호로 끄는(Turn-off) 것이 가능합니다.)"],
  ["<span style='color: #003399;'>51. 전선을 연결할 때 전선의 세기(인장 하중)는 최소 몇 % 이상 유지해야 하는가?</span>", "80% 이상 (해설: 전선을 이었을 때 원래 전선보다 20% 이상 약해지면 안 된다는 뜻입니다.)"],
  ["<span style='color: #003399;'>52. 가는 전선을 박스 안에서 연결할 때 쓰는 접속법은?</span>", "쥐꼬리 접속 (해설: 두 전선을 쥐꼬리처럼 꼬아서 묶은 뒤 와이어 커넥터를 씌우는 방식입니다.)"],
  ["<span style='color: #003399;'>53. 합성수지관(PVC) 공사에서 관 사이를 연결할 때 사용하는 부품은?</span>", "커플링 (해설: 관과 관을 직선으로 연결할 때 쓰는 소켓 형태의 부품입니다.)"],
  ["<span style='color: #003399;'>54. 가요전선관과 금속관을 서로 연결할 때 사용하는 부품은?</span>", "콤비네이션 커플링 (해설: 서로 다른 종류의 관을 결합할 때 쓰므로 '콤비네이션'입니다.)"],
  ["<span style='color: #003399;'>55. 덕트 공사 중 바닥에 설치하여 콘센트를 인출하는 공사는?</span>", "플로어 덕트 (해설: 빌딩 사무실 바닥에 전선을 깔 때 사용합니다. 'Floor'는 바닥을 뜻합니다.)"],
  ["<span style='color: #003399;'>56. 조명 기구 중 빛의 90~100%를 아래로 직접 비추는 방식은?</span>", "직접 조명 (해설: 효율은 좋으나 눈부심이 발생할 수 있는 방식입니다.)"],
  ["<span style='color: #003399;'>57. 굵은 전선을 절단할 때 사용하는 공구는?</span>", "클리퍼 (해설: 펜치로 자르기 힘든 굵은 전선이나 철선을 자를 때 사용합니다.)"],
  ["<span style='color: #003399;'>58. 전주(전봇대)를 땅에 세울 때 묻히는 최소 깊이는 전체 길이의 얼마인가?</span>", "1/6 이상 (해설: 예를 들어 12m 전봇대라면 최소 2m는 땅속에 묻어야 튼튼합니다.)"],
  ["<span style='color: #003399;'>59. 사람이 통행하는 터널 안 배선 공사 시 전선의 최소 높이는?</span>", "노면상 2.5m 이상 (해설: 사람의 손이 쉽게 닿지 않도록 충분한 높이를 확보해야 합니다.)"],
  ["<span style='color: #003399;'>60. 과전류 차단기로서 저압 전로에 사용하는 퓨즈의 주 목적은?</span>", "단락 전류 차단 (해설: 합선(단락) 등으로 과도한 전류가 흐를 때 스스로 녹아 끊어져 회로를 보호합니다.)"],
  ["<span style='color: #003399;'>61. 전압계와 전류계를 회로에 연결하는 방법은?</span>", "전압계는 병렬, 전류계는 직렬 (해설: 전압은 높낮이차이므로 양 끝에 걸고(병렬), 전류는 흐름이므로 길목에 설치(직렬)합니다.)"],
  ["<span style='color: #003399;'>62. 전기력선의 밀도는 무엇과 같은가?</span>", "전계의 세기 (해설: 전기력선이 빽빽할수록 그 지점의 전기가 당기는 힘(전계)이 강하다는 뜻입니다.)"],
  ["<span style='color: #003399;'>63. 전력량계(적산전력계)가 측정하는 것은?</span>", "사용 전력의 총합 (해설: 우리가 쓴 전기 요금을 매기기 위해 '전력 x 시간'을 측정하는 장치입니다.)"],
  ["<span style='color: #003399;'>64. 평행한 두 도선에 같은 방향으로 전류가 흐를 때 작용하는 힘은?</span>", "흡인력 (해설: 같은 방향이면 서로 끌어당기고, 반대 방향이면 서로 밀어냅니다. 전선이 꼬이는 이유 중 하나입니다.)"],
  ["<span style='color: #003399;'>65. '자기 저항'의 단위는?</span>", "[AT/Wb] (암페어턴 퍼 웨버) (해설: 자기 회로에서 자속의 흐름을 방해하는 정도를 나타냅니다.)"],
  ["<span style='color: #003399;'>66. 축전지(배터리)의 용량을 나타내는 단위는?</span>", "[Ah] (암페어 아워) (해설: 10A의 전류를 5시간 쓸 수 있다면 50Ah 용량이 됩니다.)"],
  ["<span style='color: #003399;'>67. 비사인파(찌그러진 파형) 교류의 구성 요소 3가지는?</span>", "직류분, 기본파, 고조파 (해설: 깨끗한 파형이 아니라 노이즈(고조파) 등이 섞여 있는 상태를 말합니다.)"],
  ["<span style='color: #003399;'>68. R-L-C 직렬 회로에서 임피던스가 최소가 되는 상태는?</span>", "공진 상태 (해설: 유도 리액턴스와 용량 리액턴스가 서로 상쇄되어 저항(R)만 남는 상태입니다.)"],
  ["<span style='color: #003399;'>69. 납축전지의 전해액으로 사용하는 것은?</span>", "희황산 (해설: 묽은 황산을 사용하며, 충전 시 비중이 올라가는 특징이 있습니다.)"],
  ["<span style='color: #003399;'>70. 직류 전동기 중 부하가 변해도 속도가 거의 일정한 전동기는?</span>", "분권 전동기 (해설: 정속도 특성이 있어 선반이나 연삭기 등 일정한 속도가 필요한 기계에 쓰입니다.)"],
  ["<span style='color: #003399;'>71. 발전기 유도기전력의 크기를 조절하기 위해 바꾸는 것은?</span>", "계자 저항 (또는 자속) (해설: 자석의 힘을 조절하여 만들어지는 전기의 전압을 높이거나 낮춥니다.)"],
  ["<span style='color: #003399;'>72. 변압기에서 1차 코일과 2차 코일 사이의 전기적 절연을 확인하는 시험은?</span>", "내압 시험 (해설: 높은 전압을 견디는지 확인하여 안전성을 체크합니다.)"],
  ["<span style='color: #003399;'>73. 대형 유도 전동기를 기동할 때 전압을 낮추어 기동하는 이유는?</span>", "기동 전류를 줄이기 위해 (해설: 처음부터 큰 전압을 걸면 모터가 타버릴 수 있어 전압을 낮춰 살살 시작합니다.)"],
  ["<span style='color: #003399;'>74. 농형 유도전동기의 속도 제어법 중 가장 많이 쓰이는 방식은?</span>", "주파수 제어 (인버터 제어) (해설: 주파수를 조절하여 모터의 회전 속도를 자유롭게 바꿉니다.)"],
  ["<span style='color: #003399;'>75. 단상 유도 전동기 중 기동 토크가 가장 큰 순서는?</span>", "반 - 콘 - 분 - 셰 (해설: 반발 기동형 > 콘덴서 기동형 > 분상 기동형 > 셰이딩 코일형 순입니다. 무조건 외우세요!)"],
  ["<span style='color: #003399;'>76. 동기 발전기에서 난조(출렁임)를 방지하기 위해 설치하는 권선은?</span>", "제동 권선 (해설: 자동차의 쇼바(충격흡수기)처럼 회전의 흔들림을 잡아줍니다.)"],
  ["<span style='color: #003399;'>77. 변압기의 손실 중 부하의 크기에 따라 변하는 손실은?</span>", "동손 (해설: 전류가 흐르면서 코일에서 발생하는 열 손실로, 부하가 많아지면 커집니다.)"],
  ["<span style='color: #003399;'>78. 전기자 반작용을 방지하기 위해 설치하는 가장 효과적인 것은?</span>", "보상 권선 (해설: 전기자 전류에 의한 자기장 왜곡을 반대 방향 자기장으로 상쇄시킵니다.)"],
  ["<span style='color: #003399;'>79. 다이오드를 병렬로 연결하는 주된 목적은?</span>", "허용 전류를 늘리기 위해 (해설: 길을 여러 개 만들어 더 많은 전류를 흘릴 수 있게 합니다.)"],
  ["<span style='color: #003399;'>80. 인버터(Inverter)의 역할은?</span>", "직류(DC)를 교류(AC)로 변환 (해설: 태양광 발전이나 모터 속도 제어에 필수적인 장치입니다.)"],
  ["<span style='color: #003399;'>81. 금속관 공사에서 전선을 굴곡시킬 때 곡률 반지름은 관 내경의 몇 배 이상?</span>", "6배 이상 (해설: 너무 급격하게 구부리면 전선이 상하므로 완만하게 구부려야 합니다.)"],
  ["<span style='color: #003399;'>82. 배선 공사 시 전선끼리의 접속은 어디에서 해야 하는가?</span>", "박스 또는 단자대 내부 (해설: 전선관 내부에서의 접속은 절대 금지이며 화재의 주원인입니다.)"],
  ["<span style='color: #003399;'>83. 조명 기구 중 전등 한 개를 두 곳(입구와 침대 옆 등)에서 켜고 끌 때 필요한 스위치는?</span>", "3路(3로) 스위치 2개 (해설: 복도나 계단 조명에 주로 사용되는 방식입니다.)"],
  ["<span style='color: #003399;'>84. 접지 저항을 측정할 때 사용하는 측정기 이름은?</span>", "어스 테스터 (Earth Tester) (해설: 땅(Earth)과의 저항이 얼마나 낮은지 확인합니다.)"],
  ["<span style='color: #003399;'>85. 사람이 쉽게 접촉할 우려가 있는 장소의 시설 전압 한도는?</span>", "30V 이하 (해설: 안전을 위해 전압을 낮게 제한하는 기준입니다.)"],
  ["<span style='color: #003399;'>86. 애자사용 공사에서 전선과 조영재(벽, 천장) 사이의 이격 거리는? (400V 미만)</span>", "2.5cm 이상 (해설: 전선이 벽에 직접 닿지 않도록 애자로 띄워야 합니다.)"],
  ["<span style='color: #003399;'>87. 합성수지관(PVC)의 표준 길이는?</span>", "4m (해설: 금속관은 3.66m입니다. 두 수치를 비교해서 외워두세요.)"],
  ["<span style='color: #003399;'>88. 가공 전선로에서 전선이 바람에 흔들리는 것을 방지하는 기구는?</span>", "댐퍼 (Damper) (해설: 전선에 매달려 진동을 흡수하는 추 모양의 기구입니다.)"],
  ["<span style='color: #003399;'>89. 펜치로 절단하기 힘든 굵은 전선을 자를 때 사용하는 도구는?</span>", "볼트 커터 (또는 클리퍼) (해설: 지렛대 원리를 이용해 큰 힘을 낼 수 있습니다.)"],
  ["<span style='color: #003399;'>90. 노출 배선 공사에서 전선을 보호하기 위해 벽에 붙이는 덮개는?</span>", "몰드 (Mould) (해설: 흔히 '쫄대'라고 부르는 플라스틱 덮개입니다.)"],
  ["<span style='color: #003399;'>91. 수전 설비에서 과전류 발생 시 자동으로 회로를 차단하는 장치는?</span>", "차단기 (CB, Circuit Breaker) (해설: 사고 발생 시 전체 계통을 보호하기 위해 전기를 끊습니다.)"],
  ["<span style='color: #003399;'>92. 전등 한 개를 세 곳 이상에서 제어하려고 할 때 사용하는 스위치는?</span>", "4로 스위치 (해설: 양 끝에 3로 스위치를 두고 그 사이에 4로 스위치를 추가합니다.)"],
  ["<span style='color: #003399;'>93. 전선의 피복을 벗길 때 사용하는 전용 도구는?</span>", "와이어 스트리퍼 (해설: 전선 속 심선에 상처를 주지 않고 껍질만 깔끔하게 벗깁니다.)"],
  ["<span style='color: #003399;'>94. 가공 지선의 주된 설치 목적은?</span>", "뇌해(낙뢰) 방지 (해설: 송전선 맨 위에 설치하여 벼락을 대신 맞고 땅으로 흘려보냅니다.)"],
  ["<span style='color: #003399;'>95. 저압 옥내 배선의 전선 굵기는 최소 몇 [mm^2] 이상인가? (동선 기준)</span>", "2.5[mm^2] 이상 (해설: 법적으로 정해진 최소 안전 굵기입니다.)"],
  ["<span style='color: #003399;'>96. 콘크리트 벽에 구멍을 뚫을 때 사용하는 전동 공구는?</span>", "해머 드릴 (해설: 회전과 동시에 타격력을 주어 딱딱한 콘크리트를 뚫습니다.)"],
  ["<span style='color: #003399;'>97. 전력 계통에서 전압을 높이거나 낮추는 시설은?</span>", "변전소 (해설: 송전 효율을 위해 고압으로 올리거나, 배전을 위해 전압을 낮추는 곳입니다.)"],
  ["<span style='color: #003399;'>98. 화재의 종류 중 전기 화재에 해당하는 급수는?</span>", "C급 화재 (해설: A급-일반, B급-유류, C급-전기, D급-금속 화재입니다.)"],
  ["<span style='color: #003399;'>99. 금속관 공사에서 관의 나사를 내기 위해 사용하는 도구는?</span>", "오스터 (또는 다이스) (해설: 금속관 끝부분에 나사산을 만들어 커플링과 연결합니다.)"],
  ["<span style='color: #003399;'>100. 전기 공사 시 안전을 위해 가장 먼저 확인해야 하는 장비는?</span>", "검전기 (해설: 전기가 흐르고 있는지(활선 상태) 소리나 불빛으로 확인하는 필수 안전 도구입니다.)"]
];

    let history = [];
    let currentHistoryIndex = -1;
    let isRandomMode = true;
    let sequentialIndex = 0;

    function toggleMode() {
        isRandomMode = !isRandomMode;
        const modeBtn = document.getElementById('modeBtn');

        if (isRandomMode) {
            modeBtn.innerText = "랜덤 모드";
            modeBtn.classList.remove('active');
            history = [];
            currentHistoryIndex = -1;
        } else {
            modeBtn.innerText = "순차 모드";
            modeBtn.classList.add('active');
            sequentialIndex = 0;
        }
        nextQuiz();
    }

// 특정 번호로 바로 가기 함수
function goToQuiz() {
    const input = document.getElementById('jumpNum');
    const num = parseInt(input.value);

    // 유효성 검사 (입력값이 없거나 범위를 벗어난 경우)
    if (isNaN(num) || num < 1 || num > quizData.length) {
        alert(`1부터 ${quizData.length} 사이의 숫자를 입력해주세요.`);
        return;
    }

    // 번호 이동 시 자동으로 '순차 모드'로 전환하여 학습 흐름 유지
    if (isRandomMode) {
        isRandomMode = false;
        const modeBtn = document.getElementById('modeBtn');
        modeBtn.innerText = "순차 모드";
        modeBtn.classList.add('active');
    }

    sequentialIndex = num - 1; // 배열 인덱스는 0부터 시작하므로 1을 뺌
    displayQuiz(sequentialIndex);
    sequentialIndex++; // 다음 문제 클릭 시 다음 번호가 나오도록 세팅
    updatePrevButton();

    input.value = ''; // 이동 후 입력창 비우기
    input.blur();    // 키보드 닫기 (모바일 대응)
}

    function nextQuiz() {
        if (!quizData || quizData.length === 0) return;

        if (isRandomMode) {
            if (currentHistoryIndex >= history.length - 1) {
                const randomIndex = Math.floor(Math.random() * quizData.length);
                history.push(randomIndex);
                currentHistoryIndex++;
            } else {
                currentHistoryIndex++;
            }
            displayQuiz(history[currentHistoryIndex]);
        } else {
            if (sequentialIndex < quizData.length) {
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            } else {
                alert("마지막 문제입니다. 처음으로 돌아갑니다.");
                sequentialIndex = 0;
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            }
        }
        updatePrevButton();
    }

    function prevQuiz() {
        if (isRandomMode) {
            if (currentHistoryIndex > 0) {
                currentHistoryIndex--;
                displayQuiz(history[currentHistoryIndex]);
            }
        } else {
            if (sequentialIndex > 1) {
                sequentialIndex -= 2;
                if (sequentialIndex < 0) sequentialIndex = 0;
                nextQuiz();
            }
        }
        updatePrevButton();
    }

    function displayQuiz(index) {
        const selected = quizData[index];
        document.getElementById('questionText').innerHTML = selected[0];
        document.getElementById('answerText').innerHTML = selected[1];
        document.getElementById('answerBox').style.display = 'none';

        const modeLabel = isRandomMode ? "랜덤" : "순차";
        document.getElementById('quiz-count').innerText = `[${modeLabel} 모드] 문항 번호: ${index + 1} / 전체 ${quizData.length}`;
        window.scrollTo(0, 0);
    }

    function updatePrevButton() {
        const prevBtn = document.getElementById('prevBtn');
        const canGoBack = isRandomMode ? (currentHistoryIndex > 0) : (sequentialIndex > 1);
        prevBtn.style.display = canGoBack ? 'block' : 'none';
    }

function showAnswer() {
    const answerBox = document.getElementById('answerBox');

    // 현재 정답창이 보이고 있다면 숨기고, 숨겨져 있다면 보여줍니다.
    if (answerBox.style.display === 'block') {
        answerBox.style.display = 'none';
    } else {
        answerBox.style.display = 'block';
    }
}

window.onload = nextQuiz;
</script>
